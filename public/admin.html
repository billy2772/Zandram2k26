<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Zantram 2K26</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Admin specific styles */
        body { padding: 0; min-height: 100vh; display: flex; flex-direction: column; background: #050508; }
        .admin-header {
            padding: 20px 50px; border-bottom: 1px solid var(--secondary-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .admin-main { flex: 1; padding: 40px 50px; }
        
        /* Login Form */
        #loginSection {
            display: flex; justify-content: center; align-items: center; min-height: 60vh;
        }
        .login-card {
            background: rgba(20, 13, 33, 0.8); border: 1px solid var(--secondary-color);
            padding: 40px; border-radius: 8px; width: 100%; max-width: 400px;
            box-shadow: 0 0 20px rgba(140, 0, 255, 0.2);
        }
        
        /* Dashboard Dashboard */
        #dashboardSection { display: none; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(140, 0, 255, 0.1); border: 1px solid var(--secondary-color);
            padding: 20px; text-align: center; border-radius: 5px;
        }
        .stat-card h3 { font-size: 1.2rem; margin-bottom: 10px; color: var(--accent-color); }
        .stat-card .number { font-size: 2.5rem; font-family: var(--font-heading); color: var(--primary-color); }
        
        /* Controls */
        .dashboard-controls {
            display: flex; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;
        }
        .search-input {
            padding: 10px 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--secondary-color);
            color: white; font-family: var(--font-body); outline: none; flex: 1; min-width: 250px;
        }
        
        /* Table */
        .table-responsive { overflow-x: auto; background: rgba(0,0,0,0.3); border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { font-family: var(--font-heading); color: var(--accent-color); background: rgba(20, 13, 33, 0.9); }
        tr:hover { background: rgba(140, 0, 255, 0.05); }
        
        /* Badges & Actions */
        .status-badge {
            padding: 5px 10px; border-radius: 3px; font-size: 0.85rem; font-weight: bold; text-transform: uppercase;
        }
        .status-pending { background: rgba(255, 165, 0, 0.2); color: orange; border: 1px solid orange; }
        .status-verified { background: rgba(0, 255, 136, 0.2); color: #00ff88; border: 1px solid #00ff88; }
        .status-rejected { background: rgba(255, 0, 85, 0.2); color: #ff0055; border: 1px solid #ff0055; }
        
        .action-btns { display: flex; gap: 5px; }
        .btn-sm {
            padding: 5px 10px; border: none; cursor: pointer; font-family: var(--font-body);
            font-weight: bold; font-size: 0.85rem; transition: 0.2s;
        }
        .btn-approve { background: #00ff88; color: black; }
        .btn-reject { background: #ff0055; color: white; }
        .btn-delete { background: #333; color: white; border: 1px solid #555; }
        .btn-view { background: var(--accent-color); color: black; }
        .btn-sm:hover { opacity: 0.8; }
        
        /* Modal for Screenshot */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content { max-width: 90%; max-height: 90%; padding: 20px; background: #111; border: 1px solid var(--primary-color); position: relative; }
        .modal-content img { max-width: 100%; max-height: 70vh; display: block; margin: 0 auto; }
        .close-modal {
            position: absolute; top: 10px; right: 20px; color: white; font-size: 30px; cursor: pointer;
        }
        .modal-details { margin-top: 15px; text-align: center; }
        .modal-details p { margin-bottom: 10px; font-size: 1.1rem; }
        
        .logout-btn { background: transparent; color: var(--text-color); border: 1px solid #555; padding: 5px 15px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: #ff0055; color: white; border-color: #ff0055; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    
    <header class="admin-header">
        <div class="logo">ADMIN <span class="highlight">PANEL</span></div>
        <button id="logoutBtn" class="logout-btn hidden">Logout</button>
    </header>

    <main class="admin-main">
        <!-- Login Section -->
        <section id="loginSection">
            <div class="login-card">
                <h2 style="text-align: center; margin-bottom: 20px;">SYSTEM ACCESS</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Admin Email</label>
                        <input type="email" id="adminEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="adminPassword" style="width:100%; padding:15px; background:rgba(0,0,0,0.5); border:1px solid #333; color:white; border-bottom:2px solid var(--secondary-color); margin-bottom:15px;" required>
                    </div>
                    <button type="submit" class="cyber-btn w-100">LOGIN <span class="btn-glitch"></span></button>
                    <div id="loginError" style="color:#ff0055; margin-top:10px; text-align:center;" class="hidden">Invalid credentials</div>
                </form>
            </div>
        </section>

        <!-- Dashboard Section -->
        <section id="dashboardSection">
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Registrations</h3>
                    <div class="number" id="statTotal">0</div>
                </div>
                <div class="stat-card">
                    <h3>Verified Payments</h3>
                    <div class="number" id="statVerified">0</div>
                </div>
                <div class="stat-card">
                    <h3>Pending Payments</h3>
                    <div class="number" id="statPending">0</div>
                </div>
                <div class="stat-card">
                    <h3>Rejected Payments</h3>
                    <div class="number" id="statRejected">0</div>
                </div>
            </div>

            <div class="dashboard-controls">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by name, email, or transaction ID...">
                <button id="exportBtn" class="cyber-btn" style="padding: 10px 20px; font-size: 1rem;">Export to Excel <span class="btn-glitch"></span></button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Student Details</th>
                            <th>Events</th>
                            <th>Registration Date</th>
                            <th>Transaction ID</th>
                            <th>Payment Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Screenshot Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <img id="modalImage" src="" alt="Payment Screenshot">
            <div class="modal-details">
                <p>Transaction ID: <strong id="modalTxn" class="highlight"></strong></p>
                <div class="action-btns" style="justify-content: center; gap: 20px;">
                    <button id="modalApproveBtn" class="btn-sm btn-approve" style="padding: 10px 20px; font-size: 1rem;">Approve</button>
                    <button id="modalRejectBtn" class="btn-sm btn-reject" style="padding: 10px 20px; font-size: 1rem;">Reject</button>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
